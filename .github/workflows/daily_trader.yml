name: Daily Paper Trader

on:
  schedule:
    # 9:45 AM UTC = 3:15 PM IST. Runs Mon-Fri after market close.
    - cron: '45 9 * * 1-5'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write  # needed to push updated ledger back to repo

jobs:
  run-trader:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas "yfinance[nospam]" curl_cffi python-dotenv pydantic pydantic-settings numpy sqlalchemy psycopg[binary] pyyaml kiteconnect pyarrow statsmodels
          pip install -e . || true

      - name: Diagnose Data Fetch
        run: |
          python - <<'EOF'
          import yfinance as yf
          try:
              import curl_cffi
              print(f"curl_cffi OK: {curl_cffi.__version__}")
          except ImportError:
              print("curl_cffi: NOT INSTALLED")
          print(f"yfinance: {yf.__version__}")
          df = yf.download("SBIN.NS", period="5d", interval="1d", progress=False, auto_adjust=True)
          print(f"SBIN fetch empty: {df.empty}, rows: {len(df)}")
          if not df.empty:
              print(df.tail(2).to_string())
          EOF

      - name: Run Master Risk Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/run_master_trader.py

      - name: Persist Updated Ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/master_position_ledger.json
          git diff --staged --quiet || git commit -m "chore: update master position ledger [skip ci]"
          git push
